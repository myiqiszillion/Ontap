<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Thông Báo - Admin</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .admin-title {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-group input, .form-group textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }
        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-ghost);
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            display: block;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            display: block;
        }

        /* Management Styles */
        .management-section {
            max-width: 600px;
            margin: 20px auto 40px;
            padding: 0 30px;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        .announcements-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .admin-ann-item {
            background: var(--bg-white);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .admin-ann-info {
            flex: 1;
        }
        .admin-ann-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .admin-ann-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .delete-btn {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: var(--red);
            color: white;
        }

        /* Drop Zone Styles */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(0,0,0,0.01);
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }
        .drop-zone-text {
            font-weight: 600;
            color: var(--text-secondary);
            pointer-events: none;
        }
        .drop-zone-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .image-preview-container {
            margin-top: 16px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .image-preview-container img {
            max-width: 100%;
            display: block;
        }
        .admin-image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .admin-preview-item {
            position: relative;
            padding-bottom: 100%; /* square aspect ratio */
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-gray);
        }
        .admin-preview-item img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .remove-image-btn {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 24px; height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .remove-image-btn:hover {
            background: rgba(255,50,50,0.8);
        }
    </style>
</head>
<body id="app-body" class="dark-mode">

<div class="app">
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <img src="logo.png" alt="NTMK Logo" class="logo-img">
                <span class="logo-text">Admin Panel</span>
            </div>
            <button class="back-btn" onclick="window.location.href='/'" style="margin-left: auto;">Về Trang Chủ</button>
        </div>
    </header>

    <div class="admin-container">
        <h2 class="admin-title">Đăng Thông Báo Mới (Database Supabase)</h2>
        
        <form id="announcement-form">
            <div class="form-group">
                <label for="title">Tiêu đề bài viết (*)</label>
                <input type="text" id="title" placeholder="Nhập tiêu đề..." required>
            </div>
            
            <div class="form-group">
                <label for="content">Nội dung chi tiết (*)</label>
                <textarea id="content" placeholder="Bạn có thể viết câu hỏi, đáp án, hoặc bài viết hay vào đây..." required style="min-height: 150px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="link">Đường dẫn / Link đính kèm (Tuỳ chọn)</label>
                <input type="url" id="link" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Hình ảnh đính kèm (Có thể chọn hoặc dán nhiều ảnh)</label>
                <div id="drop-zone" class="drop-zone">
                    <span class="drop-zone-text">Kéo thả ảnh vào đây, hoặc <span style="color:var(--primary);cursor:pointer">chọn tệp</span><br><small style="color:var(--text-muted);font-weight:normal">Hỗ trợ <code>Ctrl + V</code> để dán nhiều ảnh trực tiếp</small></span>
                    <input type="file" id="image" accept="image/*" multiple class="drop-zone-input">
                </div>
                <div id="image-preview" class="admin-image-grid" style="display: none;">
                    <!-- Previews injected here -->
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">Đăng Lên Website</button>
            <div id="status-message" class="message"></div>
        </form>
    </div>

    <div class="management-section">
        <h2 class="section-title">Quản lý Thông báo</h2>
        <div id="announcements-list" class="announcements-list">
            <p style="text-align: center; color: var(--text-muted);">Đang tải thông báo...</p>
        </div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/admin.js"></script>
</body>
</html>
