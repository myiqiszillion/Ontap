<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Thông Báo - Admin</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body id="app-body" class="dark-mode">

<div class="app">
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <img src="assets/logo.png" alt="NTMK Logo" class="logo-img">
                <span class="logo-text">Admin Panel</span>
            </div>
            <button class="back-btn" onclick="window.location.href='/'" style="margin-left: auto;">Về Trang Chủ</button>
        </div>
    </header>

    <div class="admin-container glass-card">
        <h2 class="admin-title">Đăng Thông Báo Mới (Database Supabase)</h2>
        
        <form id="announcement-form">
            <div class="form-group">
                <label for="title">Tiêu đề bài viết (*)</label>
                <input type="text" id="title" placeholder="Nhập tiêu đề..." required>
            </div>
            
            <div class="form-group">
                <label for="content">Nội dung chi tiết (*)</label>
                <textarea id="content" placeholder="Bạn có thể viết câu hỏi, đáp án, hoặc bài viết hay vào đây..." required style="min-height: 150px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="link">Đường dẫn / Link đính kèm (Tuỳ chọn)</label>
                <input type="url" id="link" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Hình ảnh đính kèm (Có thể chọn hoặc dán nhiều ảnh)</label>
                <div id="drop-zone" class="drop-zone">
                    <svg class="drop-zone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span class="drop-zone-text">Kéo thả ảnh vào đây, hoặc <span style="color:var(--primary);cursor:pointer">chọn tệp</span><br><small style="color:var(--text-muted);font-weight:normal">Hỗ trợ <code>Ctrl + V</code> để dán nhiều ảnh trực tiếp</small></span>
                    <input type="file" id="image" accept="image/*" multiple class="drop-zone-input">
                </div>
                <div id="image-preview" class="admin-image-grid" style="display: none;">
                    <!-- Previews injected here -->
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">Đăng Lên Website</button>
        </form>
    </div>

    <div class="management-section">
        <h2 class="section-title">Quản lý Thông báo</h2>
        <div id="announcements-list" class="announcements-list">
            <p style="text-align: center; color: var(--text-muted);">Đang tải thông báo...</p>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/admin.js"></script>
</body>
</html>
