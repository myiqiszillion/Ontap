<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Thông Báo - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .admin-title {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-group input, .form-group textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }
        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-ghost);
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            display: block;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            display: block;
        }
    </style>
</head>
<body id="app-body" class="dark-mode">

<div class="app">
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">👑</div>
                <span class="logo-text">Admin Panel</span>
            </div>
            <button class="back-btn" onclick="window.location.href='/'" style="margin-left: auto;">Về Trang Chủ</button>
        </div>
    </header>

    <div class="admin-container">
        <h2 class="admin-title">Đăng Thông Báo Mới (Database Supabase)</h2>
        
        <form id="announcement-form">
            <div class="form-group">
                <label for="title">Tiêu đề bài viết (*)</label>
                <input type="text" id="title" placeholder="Nhập tiêu đề..." required>
            </div>
            
            <div class="form-group">
                <label for="content">Nội dung chi tiết (*)</label>
                <textarea id="content" placeholder="Bạn có thể viết câu hỏi, đáp án, hoặc bài viết hay vào đây..." required style="min-height: 150px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="link">Đường dẫn / Link đính kèm (Tuỳ chọn)</label>
                <input type="url" id="link" placeholder="https://...">
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">Đăng Lên Website</button>
            <div id="status-message" class="message"></div>
        </form>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
