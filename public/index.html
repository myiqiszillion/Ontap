<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Platform - Ôn Tập Trắc Nghiệm</title>
  <meta name="description" content="Nền tảng ôn tập trắc nghiệm đa môn học">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<div class="app">

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 1: HOME/DASHBOARD
       ═══════════════════════════════════════════════════════════ -->
  <section id="screen-home" class="screen on">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">📚</div>
          <span class="logo-text">Ôn Tập</span>
        </div>
        <p class="subtitle">Nền tảng ôn tập trắc nghiệm</p>
      </div>
    </header>

    <h1 class="home-title">Chọn môn học</h1>
    <p class="home-subtitle">Chọn môn bạn muốn ôn tập để bắt đầu</p>

    <div class="subjects-grid" id="subjects-grid">
      <!-- Dynamic: Render from subjects.json -->
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 2: TOPIC SELECTION (NEW)
       ═══════════════════════════════════════════════════════════ -->
  <section id="screen-topics" class="screen">
    <header class="quiz-header">
      <button class="back-btn" onclick="app.goBackToHome()">← Quay lại</button>
      <div class="quiz-info">
        <span class="subject-badge" id="selected-subject-name">Lịch Sử 10</span>
      </div>
      <div class="timer" id="topics-timer" style="visibility: hidden;">
        <span class="timer-icon">⏱️</span>
        <span id="topics-timer-display">00:00</span>
      </div>
    </header>

    <div class="topics-container">
      <div class="topics-header">
        <h2>Chọn các bài học</h2>
        <p class="topics-subtitle">Chọn ít nhất 1 bài để tiếp tục</p>
        <button class="select-all-btn" onclick="app.selectAll()">Chọn tất cả</button>
      </div>

      <div class="topics-list" id="topics-list">
        <!-- Dynamic: Render topics from JSON -->
      </div>

      <div class="quiz-config">
        <div class="config-row">
          <label for="exam-mode">Dạng đề:</label>
          <select id="exam-mode">
            <option value="exam" selected>📝 Đề thi (12 TN + 4 Đ/S)</option>
            <option value="mcq">📋 Chỉ Trắc nghiệm</option>
            <option value="tf">✅ Chỉ Đúng/Sai</option>
            <option value="all">📚 Tất cả</option>
          </select>
        </div>
        <div class="config-row">
          <label for="quiz-duration">Thời gian:</label>
          <select id="quiz-duration">
            <option value="10">10 phút</option>
            <option value="20" selected>20 phút</option>
            <option value="30">30 phút</option>
            <option value="45">45 phút</option>
            <option value="0">Không giới hạn</option>
          </select>
        </div>

        <div class="quiz-summary" id="quiz-summary">
          <span class="summary-item">
            <strong id="summary-questions">0</strong>
          </span>
          <span class="summary-divider">•</span>
          <span class="summary-item">
            <strong id="summary-time">0</strong> phút
          </span>
        </div>

        <button class="start-btn" id="start-btn" disabled>
          🎯 Bắt đầu thi
        </button>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 3: QUIZ INTERFACE
       ═══════════════════════════════════════════════════════════ -->
  <section id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button class="back-btn" onclick="app.quitQuiz()">← Thoát</button>
      <div class="quiz-info">
        <span class="subject-badge" id="quiz-subject">Lịch Sử 10</span>
        <span class="progress-badge" id="quiz-progress">1/20</span>
      </div>
      <div class="timer" id="active-timer">
        <span class="timer-icon">⏱️</span>
        <span id="active-timer-display">20:00</span>
      </div>
    </header>

    <div class="quiz-layout">
      <!-- Sidebar: Question Navigator -->
      <aside class="quiz-sidebar">
        <div class="sidebar-header">Câu hỏi</div>
        <div class="question-dots" id="question-dots">
          <!-- Dynamic: Render dots -->
        </div>
      </aside>

      <!-- Main: Question Card -->
      <main class="quiz-main">
        <div class="question-card">
          <div class="question-meta">
            <span class="question-type-badge" id="q-type-badge">MCQ</span>
            <span class="question-number">Câu <span id="q-num">1</span></span>
          </div>
          <div class="question-text" id="q-text">Đang tải...</div>
          <div class="options" id="options-container">
            <!-- Dynamic: Render A, B, C, D or Đúng/Sai -->
          </div>
        </div>

        <div class="quiz-nav">
          <button class="nav-btn prev" id="btn-prev" onclick="Quiz.prev()">
            ← Trước
          </button>
          <button class="nav-btn next" id="btn-next" onclick="Quiz.next()">
            Tiếp →
          </button>
          <button class="nav-btn submit hidden" id="btn-submit" onclick="Quiz.submit()">
            ✓ Nộp bài
          </button>
        </div>
      </main>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 4: RESULTS
       ═══════════════════════════════════════════════════════════ -->
  <section id="screen-result" class="screen">
    <div class="result-card">
      <div class="score-circle">
        <svg viewBox="0 0 100 100">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00B074"/>
              <stop offset="50%" stop-color="#33C08F"/>
              <stop offset="100%" stop-color="#66D4AD"/>
            </linearGradient>
          </defs>
          <circle class="score-bg" cx="50" cy="50" r="45"/>
          <circle class="score-fill" id="score-ring" cx="50" cy="50" r="45"
                  stroke-dasharray="282.74" stroke-dashoffset="282.74"/>
        </svg>
        <div class="score-text">
          <span class="score-value" id="score-value">0</span>
          <span class="score-total">/ <span id="score-total">20</span></span>
        </div>
      </div>

      <h2 class="result-title">Kết quả</h2>
      <p class="result-message" id="result-message">Xuất sắc!</p>

      <div class="result-stats">
        <div class="stat correct">
          <span class="stat-num" id="correct-count">0</span>
          <span class="stat-label">Đúng</span>
        </div>
        <div class="stat wrong">
          <span class="stat-num" id="wrong-count">0</span>
          <span class="stat-label">Sai</span>
        </div>
        <div class="stat time">
          <span class="stat-num" id="time-used">0:00</span>
          <span class="stat-label">Thời gian</span>
        </div>
      </div>

      <div class="result-actions">
        <button class="action-btn primary" onclick="app.goHome()">
          🏠 Trang chủ
        </button>
        <button class="action-btn secondary" onclick="Quiz.review()">
          📝 Xem đáp án
        </button>
        <button class="action-btn secondary" onclick="Quiz.retry()">
          🔄 Làm lại
        </button>
      </div>

      <!-- Review Section (Hidden by default) -->
      <div class="review-section hidden" id="review-section">
        <h3>Chi tiết đáp án</h3>
        <div class="review-list" id="review-list">
          <!-- Dynamic: Render review items -->
        </div>
      </div>
    </div>
  </section>

</div>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/timer.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>
</body>
</html>
